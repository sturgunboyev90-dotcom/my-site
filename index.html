<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qiziqarli sahifa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 48px;
}

p {
    font-size: 20px;
    opacity: 0.8;
}

.qr {
    margin-top: 30px;
    transition: 0.3s;
}

.qr:hover {
    transform: scale(1.1);
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: black;
    cursor: pointer;
}

button:hover {
    background: #00a2cc;
}
</style>

</head>
<body>

<div class="container">
    <h1>🔥 Maxfiy sahifa</h1>
    <p>Bu yerda qiziqarli narsa bor...</p>

    <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/" alt="QR code">

    <br>
    <button onclick="alert('😎 Yana tez orada yangi funksiyalar qo‘shiladi!')">
        Bosib ko‘r
    </button>
</div>

</body>
</html>
<h2>Ro‘yxatdan o‘tish</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Parol"><br><br>

<button onclick="register()">Ro‘yxatdan o‘tish</button>
<button onclick="login()">Kirish</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SENIKI",
  authDomain: "SENIKI",
  projectId: "SENIKI",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Ro‘yxatdan o‘tdi ✅"))
    .catch(err => alert(err.message));
}

window.login = function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Kirdi ✅"))
    .catch(err => alert(err.message));
}
</script>
